name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Acceptance tests seed + read ONE shared sandbox backend (clearAll + reseed
# each run). Two CI runs overlapping there race: one run's clearAll wipes rows
# mid-read in the other's test, or two seeds interleave and leave duplicates.
# A SINGLE global group serializes every CI run so only one owns the sandbox at
# a time. Don't cancel in progress: a running suite must finish its
# clear→seed→read cycle uncorrupted before the next run starts.
concurrency:
  group: ci-shared-sandbox
  cancel-in-progress: false

jobs:
  quality:
    name: Lint, Test, Coverage, CRAP & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS "personal" profile
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.aws
          printf '[personal]\naws_access_key_id=%s\naws_secret_access_key=%s\n' \
            "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" > ~/.aws/credentials
          printf '[profile personal]\nregion=us-west-2\n' > ~/.aws/config

      - name: Generate amplify_outputs.json (sandbox)
        run: npm run e2e-config

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: File-length discipline (max 100 lines)
        run: npm run check:lines

      - name: Unit tests with coverage (80% floor)
        run: npm run test:coverage

      - name: CRAP score analysis (threshold 15)
        run: npm run crap

      - name: Build
        run: npm run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  seed:
    # Acceptance tests run against the shared sandbox backend, seeded fresh here
    # so every run starts from an identical, bounded state — the root fix for
    # e2e flakiness/drift.
    name: Seed sandbox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure AWS "personal" profile
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.aws
          printf '[personal]\naws_access_key_id=%s\naws_secret_access_key=%s\n' \
            "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" > ~/.aws/credentials
          printf '[profile personal]\nregion=us-west-2\n' > ~/.aws/config
      - name: Generate amplify_outputs.json (sandbox)
        run: npm run e2e-config
      - name: Seed the sandbox to a known state
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: npm run seed

  acceptance:
    # One job per feature area, each its own independent check. Runs after the
    # sandbox is seeded. Grows a matrix entry per feature area as slices land.
    name: Acceptance Tests (${{ matrix.area.name }})
    needs: seed
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        area:
          - name: discover
            paths: .features-gen/e2e/features/discover
          - name: my-decks
            paths: .features-gen/e2e/features/mydecks
          - name: study
            paths: .features-gen/e2e/features/study
          - name: admin
            paths: .features-gen/e2e/features/admin
          - name: journey
            paths: .features-gen/e2e/features/journey
          - name: play
            paths: .features-gen/e2e/features/play
          - name: steps
            paths: .features-gen/e2e/features/steps
          - name: acrostic
            paths: .features-gen/e2e/features/acrostic
          - name: quizzle
            paths: .features-gen/e2e/features/quizzle
          - name: chess
            paths: .features-gen/e2e/features/chess
          - name: daily
            paths: .features-gen/e2e/features/daily
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS "personal" profile
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.aws
          printf '[personal]\naws_access_key_id=%s\naws_secret_access_key=%s\n' \
            "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" > ~/.aws/credentials
          printf '[profile personal]\nregion=us-west-2\n' > ~/.aws/config

      - name: Generate amplify_outputs.json (sandbox)
        run: npm run e2e-config

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run acceptance tests (${{ matrix.area.name }})
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: npx bddgen && npx playwright test ${{ matrix.area.paths }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ matrix.area.name }}
          path: playwright-report/
          retention-days: 7
