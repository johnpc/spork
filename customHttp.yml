# Security response headers for Amplify Hosting (served via CloudFront on every
# response). Deliberately the SAFE, high-value set that can't break the app:
#
#  - HSTS: force HTTPS for a year incl. subdomains (site is HTTPS-only via CF).
#  - X-Content-Type-Options: stop MIME-sniffing (defends against content confusion).
#  - X-Frame-Options: DENY framing → clickjacking protection (app is never embedded).
#  - Referrer-Policy: send only the origin on cross-site nav (privacy).
#  - Permissions-Policy: disable device APIs the web app never uses.
#
# Content-Security-Policy: 'unsafe-inline' for script/style is REQUIRED — Vite's
# bootstrap emits inline module/legacy scripts and Ionic injects inline styles at
# runtime (so 'self' alone would white-screen the app). Everything else is scoped
# tight: connect-src to the exact backends the running app calls (AppSync +
# Cognito + S3 under *.amazonaws.com, media under *.jpc.io), object-src none,
# frame-ancestors none, base-uri self. VERIFIED empirically: a browser sweep of
# every flow (home, text quiz, map, multiple-choice feedback, chess lazy chunk,
# discover, you) with this exact policy enforced produced ZERO violations, and a
# network trace confirmed connect-src covers every runtime origin. Re-verify with
# scripts/... if the build tooling or backend endpoints change.
customHeaders:
  - pattern: '**'
    headers:
      - key: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains'
      - key: X-Content-Type-Options
        value: 'nosniff'
      - key: X-Frame-Options
        value: 'DENY'
      - key: Referrer-Policy
        value: 'strict-origin-when-cross-origin'
      - key: Permissions-Policy
        value: 'camera=(), microphone=(), geolocation=(), interest-cohort=()'
      - key: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.amazonaws.com wss://*.amazonaws.com https://*.jpc.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
