<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Spork — a stack of little brain games</title>
    <meta
      name="description"
      content="A new set of daily brain games every day — maps, trivia, word ladders, chess puzzles and more. Play free, no account needed."
    />

    <base href="/" />

    <!-- Canonical: the app is a single-page app served from one index.html for
         every route, so query-string / trailing-slash variants of the origin
         shouldn't be treated as separate pages. Points at the site root (matches
         og:url); the sitemap enumerates the individual game landing pages. -->
    <link rel="canonical" href="https://spork.jpc.io/" />

    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#5B8DEF" />
    <!-- Allow pinch-zoom (no maximum-scale / user-scalable=no) — disabling it
         fails WCAG 1.4.4 and blocks low-vision users. viewport-fit=cover is kept
         for the notch/Dynamic Island safe-area insets. -->
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />

    <!-- Add to homescreen for iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SPORK" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph / social (so shared spork.jpc.io links unfurl a preview card) -->
    <meta property="og:title" content="Spork — a stack of little brain games" />
    <meta
      property="og:description"
      content="A new set of daily brain games every day — maps, trivia, word ladders, chess puzzles and more. Play free, no account needed."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://spork.jpc.io/" />
    <meta property="og:image" content="https://spork.jpc.io/banner.png" />
    <meta property="og:image:width" content="1792" />
    <meta property="og:image:height" content="592" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Spork — a stack of little brain games" />
    <meta
      name="twitter:description"
      content="A new set of daily brain games every day. Play free, no account needed."
    />
    <meta name="twitter:image" content="https://spork.jpc.io/banner.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
